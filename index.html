<!DOCTYPE html>
<html lang="sq" class="medindex-clean-ui medindex-tailadmin">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="theme-color" content="#0d3d40">
<title>MedIndex | Regjistri i Barnave — Dr. Diellza Rabushaj</title>
<link rel="stylesheet" href="styles.css?v=20260723-2">
<link rel="stylesheet" href="ui-controls.css?v=20260722-7">
<link rel="stylesheet" href="loader.css?v=20260722-6">
<link rel="stylesheet" href="app-polish.css?v=20260723-2">
<link rel="stylesheet" href="performance.css?v=20260723-1">
<link rel="stylesheet" href="clean-medindex-ui.css?v=20260723-1">
<link rel="stylesheet" href="tailadmin-medindex.css?v=20260724-3" data-tailadmin-medindex-css>
<link rel="stylesheet" href="tailadmin-professional.css?v=20260724-1" data-tailadmin-professional-css>
<script src="tailadmin-shell.js?v=20260724-3" defer></script>
<script src="tailadmin-professional.js?v=20260724-1" defer></script>
</head>
<body>
<a class="skip-link" href="#registryContent">Kalo te regjistri i barnave</a>
<div class="page-loader" id="pageLoader" role="status" aria-live="polite" aria-label="Duke i ngarkuar barnat">
  <div class="loader-content">
    <div class="wrapper" aria-hidden="true">
      <div class="circle"></div><div class="circle"></div><div class="circle"></div>
      <div class="shadow"></div><div class="shadow"></div><div class="shadow"></div>
    </div>
    <p>Duke i ngarkuar barnat...</p>
  </div>
</div>

<header>
  <h1>MedIndex | Regjistri i Barnave dhe Diagnozave ICD</h1>
  <div class="sub">Dr. Diellza Rabushaj · Versioni 1.2 · Afati i vlefshmërisë: 01.05.2026 – 31.12.2026</div>
</header>

<div class="toolbar" role="search" aria-label="Kërkimi dhe filtrat e regjistrit">
  <input type="search" id="search" placeholder="Kërko emrin, substancën, klasën, përdorimin, ATC..." autocomplete="off" enterkeyhint="search" aria-label="Kërko në regjistrin e barnave">
  <select id="statusFilter" aria-label="Filtro statusin">
    <option value="">Të gjitha statuset</option>
    <option value="Gjenerik">Gjenerik</option>
    <option value="Origjinator">Origjinator</option>
  </select>
  <div class="form-picker">
    <button id="formPickerBtn" type="button" aria-haspopup="listbox" aria-controls="formPanel" aria-expanded="false">Forma: Të gjitha ▾</button>
    <div class="form-panel" id="formPanel">
      <input type="search" id="formSearch" placeholder="Kërko formën (p.sh. kapsul, tablet)..." autocomplete="off" aria-label="Kërko formën farmaceutike">
      <div id="formList" role="listbox"></div>
    </div>
  </div>
  <select id="pageSize" aria-label="Numri i barnave për faqe">
    <option value="50">50 / faqe</option>
    <option value="100">100 / faqe</option>
    <option value="250">250 / faqe</option>
    <option value="500">500 / faqe</option>
    <option value="4006" hidden>Favoritet</option>
  </select>
  <div class="col-picker">
    <button id="colPickerBtn" type="button" aria-haspopup="menu" aria-controls="colPanel" aria-expanded="false">Kolonat ▾</button>
    <div class="col-panel" id="colPanel"></div>
  </div>
  <span class="selection-badge" title="Barnat e zgjedhura për recetë">Të zgjedhura: <strong id="selectedCount">0</strong></span>
  <button class="protocol-toolbar-btn" id="protocolsBtn" type="button">Krijo recetën <span class="mini-count" id="savedProtocolCount">0</span></button>
  <span class="count-badge" id="countBadge" aria-live="polite">Duke u ngarkuar...</span>
</div>

<div class="table-wrap" id="registryContent" tabindex="-1" aria-label="Tabela e regjistrit të barnave">
  <table id="dataTable">
    <thead><tr id="headerRow"></tr></thead>
    <tbody id="tbody"><tr><td class="empty-state">Duke i ngarkuar barnat...</td></tr></tbody>
  </table>
</div>
<div class="pagination" id="pagination" aria-label="Faqet e rezultateve"></div>
<div class="protocol-toast" id="protocolToast" role="status" aria-live="polite"></div>

<script id="drug-data" type="application/json">[]</script>
<script>window.DRUG_DATA_PARTS = [];</script>
<script src="app.js?v=20260724-5" defer></script>
<script src="ui-enhancements.js?v=20260724-1" defer></script>

<script src="name-display.js?v=20260722-1" defer></script>
<script src="auth-client.js?v=20260723-3" defer></script>
<script src="app-stability.js?v=20260724-2" defer></script>
</body>
</html>
