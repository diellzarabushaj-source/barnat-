name: Validate MedIndex

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install registry sync dependency
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Validate standalone JavaScript
        run: |
          node --check api/registry.js
          node --check api/dosage.js
          node --check app.js
          node --check ui-enhancements.js
          node --check medindex-view.js
          node --check name-display.js
          node --check dosage-integration.js
          node --check prescription-review.js
          node --check data/registry-quality.js
          node --check classification.js
          node --check classification-info.js
          node --check classification-icons.js

      - name: Validate concatenated application bundle
        run: |
          cat app-parts/part-01.txt \
              app-parts/part-02.txt \
              app-parts/part-03.txt \
              app-parts/part-04.txt \
              app-parts/part-05.txt \
              app-parts/part-06.txt \
              app-parts/part-07.txt > /tmp/medindex-app-bundle.js
          node --check /tmp/medindex-app-bundle.js

      - name: Validate registry quality rules
        run: |
          python -m py_compile scripts/sync_sheet.py
          python - <<'PY'
          from scripts.sync_sheet import apply_quality_corrections, assert_critical_registry_rules

          sample = [{
              'ProtocolNo': 'PD1339/051225',
              'PDID': 42,
              'Emri tregtar': 'ANALGIN ®',
              'Substanca aktive': 'Metronidazole micronised',
              'ATC Code': 'N02BB02',
              'Fortësia': '1 g/2 ml',
              'Forma farmaceutike': 'Solution for injection',
          }]
          corrected, applied = apply_quality_corrections(sample)
          assert len(applied) == 1, applied
          assert corrected[0]['Substanca aktive'] == 'Metamizole sodium', corrected[0]
          assert_critical_registry_rules(corrected)
          PY
          grep -q 'REG-2026-001' data/registry-quality.js
          grep -q 'PD1339/051225' data/registry-quality.js
          grep -q 'Metamizole sodium' scripts/sync_sheet.py
          grep -q 'registryQuality.applyRows' api/registry.js

      - name: Verify prescription safety gates
        run: |
          grep -q 'id="rxComposer"' recetat.html
          grep -q 'id="rxGeneratedReview"' recetat.html
          grep -q 'id="rxDosageReview"' recetat.html
          ! grep -q 'protocolOverlay' index.html
          grep -q 'validateForPrint' prescription-review.js
          grep -q 'reviewedAt' prescription-review.js
          grep -q 'DRAFT — JO PËR PËRDORIM FINAL' medindex-view.js
          grep -q 'mi-signature-grid' medindex-view.js
          grep -q 'clinicalReview' app-parts/part-06.txt
          grep -q 'dosageDatasetVersion' app-parts/part-06.txt
          grep -q 'MedIndexPrescriptionView' app-parts/part-07.txt
          grep -q 'ENABLE_DOSAGE_AUTOFILL' api/dosage.js
          grep -q 'Cache-Control.*no-store' api/dosage.js
