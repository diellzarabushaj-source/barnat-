name: MedIndex validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          files=(
            app.js
            app-stability.js
            main-navigation-extension.js
            navigation-consistency.js
            medical-icons.js
            section-icons.js
            classification-icons.js
            recetat.js
            api/gemini-prescription.js
            api/drug-search.js
            api/registry.js
            api/registry-data.js
            api/dosage.js
          )
          for file in "${files[@]}"; do
            test -f "$file"
            node --check "$file"
          done
          cat app-parts/part-01.txt app-parts/part-02.txt app-parts/part-03.txt app-parts/part-04.txt app-parts/core-tail.txt > /tmp/medindex-registry-bundle.js
          node --check /tmp/medindex-registry-bundle.js

      - name: Verify the dedicated prescription dashboard
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'href="recetat.html"' index.html
          grep -q 'id="rxComposer"' recetat.html
          grep -q '@forma' recetat.html
          grep -q '@bari' recetat.html
          grep -q '@doza' recetat.html
          grep -q '@tjetër' recetat.html
          grep -q '@signatura' recetat.html
          grep -q '/api/gemini-prescription' recetat.js
          grep -q '/api/drug-search' recetat.js
          grep -q 'sharedSignature' recetat.js
          ! grep -q 'protocolOverlay' index.html
          ! grep -q 'dosage-auto-apply.js' index.html
          ! grep -q 'prescription-review.js' index.html

      - name: Verify Gemini formatting guardrails
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'GEMINI_API_KEY' api/gemini-prescription.js
          grep -q "responseMimeType: 'application/json'" api/gemini-prescription.js
          grep -q 'responseSchema' api/gemini-prescription.js
          grep -q 'thinkingBudget: 0' api/gemini-prescription.js
          grep -q 'Mos shto asnjë bar, dozë, frekuencë, kohëzgjatje, rrugë' api/gemini-prescription.js
          grep -q 'sharedSignature' api/gemini-prescription.js
          grep -q 'fushën bosh' api/gemini-prescription.js
