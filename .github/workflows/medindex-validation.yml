name: MedIndex validation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-tailadmin-ui:
    if: github.event.pull_request.head.ref == 'feat/tailadmin-ui-rebuild' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI branch
        uses: actions/checkout@v4
        with:
          ref: feat/tailadmin-ui-rebuild
          fetch-depth: 0

      - name: Reconstruct and verify UI payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .ui-rebuild-payload/part-00 \
            .ui-rebuild-payload/part-01 \
            .ui-rebuild-payload/part-02 \
            .ui-rebuild-payload/remain-00 \
            .ui-rebuild-payload/remain-01 \
            .ui-rebuild-payload/remain-02 \
            .ui-rebuild-payload/remain-03 \
            .ui-rebuild-payload/remain-04 \
            .ui-rebuild-payload/remain-05 \
            .ui-rebuild-payload/remain-06 \
            .ui-rebuild-payload/remain-07 \
            .ui-rebuild-payload/remain-08 \
            .ui-rebuild-payload/remain-09 \
            .ui-rebuild-payload/remain-10 \
            | base64 --decode > /tmp/medindex-ui-rebuild.tar.gz
          echo '7c10b0707c090c950c6a77761112069f2ac09511595526590fc85cd88a3ff18e  /tmp/medindex-ui-rebuild.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/medindex-ui-rebuild.tar.gz
          rm -rf .ui-rebuild-payload
          rm -f .ui-rebuild-payload.tar.gz
          git fetch origin main
          git checkout origin/main -- .github/workflows/medindex-validation.yml

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate rebuilt MedIndex
        run: npm test

      - name: Commit rebuilt interface
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Rebuild MedIndex UI with TailAdmin layout'
          git push origin HEAD:feat/tailadmin-ui-rebuild
