name: Fetch TailAdmin source

on:
  push:
    branches:
      - feat/tailadmin-ui-rebuild
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch-template:
    runs-on: ubuntu-latest
    steps:
      - name: Download TailAdmin community template
        run: |
          curl --fail --location --retry 3 \
            https://github.com/TailAdmin/tailadmin-free-tailwind-dashboard-template/archive/refs/heads/main.zip \
            --output tailadmin-main.zip
      - name: Upload template snapshot
        uses: actions/upload-artifact@v4
        with:
          name: tailadmin-source
          path: tailadmin-main.zip
          retention-days: 1
