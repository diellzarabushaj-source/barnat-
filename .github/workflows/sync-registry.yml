name: Sync registry from Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-registry.yml"
      - "scripts/sync_sheet.py"

permissions:
  contents: write

concurrency:
  group: sync-medicine-registry
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install converter dependency
        run: python -m pip install --disable-pip-version-check openpyxl==3.1.5

      - name: Download editable registry from Google Drive
        env:
          DRIVE_FILE_ID: 1SY2rb2Eqo3fVkRhgQ8ltJHCRrWyAUDvd
        run: |
          curl --fail --location --retry 3 --retry-delay 3 \
            "https://drive.usercontent.google.com/download?id=${DRIVE_FILE_ID}&export=download&confirm=t" \
            --output registry-source.xlsx
          test -s registry-source.xlsx

      - name: Generate browser database
        run: python scripts/sync_sheet.py registry-source.xlsx data/registry-data.js

      - name: Commit updated database
        run: |
          if git diff --quiet -- data/registry-data.js; then
            echo "No registry changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/registry-data.js
          git commit -m "Sync medicine registry from Google Drive"
          git push
