name: Prescription debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture complete test suite
        shell: bash
        run: |
          set +e
          npm test > prescription-test-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> prescription-test-output.txt
          exit 0
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: prescription-test-output
          path: prescription-test-output.txt
