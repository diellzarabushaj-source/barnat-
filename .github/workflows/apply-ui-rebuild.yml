name: Apply TailAdmin UI rebuild

on:
  push:
    branches:
      - feat/tailadmin-ui-rebuild

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified UI payload
        run: |
          test -f .ui-rebuild-payload.tar.gz
          echo '7c10b0707c090c950c6a77761112069f2ac09511595526590fc85cd88a3ff18e  .ui-rebuild-payload.tar.gz' | sha256sum --check --strict
          tar -xzf .ui-rebuild-payload.tar.gz
          rm -f .ui-rebuild-payload.tar.gz
          rm -f .github/workflows/apply-ui-rebuild.yml
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/fetch-tailadmin.yml

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate MedIndex
        run: npm test

      - name: Commit rebuilt interface
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Rebuild MedIndex UI with TailAdmin layout'
          git push origin HEAD:feat/tailadmin-ui-rebuild
