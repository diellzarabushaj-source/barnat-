name: Validate MedIndex

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: medindex-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run full backend, frontend, security and data tests
        run: npm test
