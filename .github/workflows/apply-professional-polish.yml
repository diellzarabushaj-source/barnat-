name: Apply professional TailAdmin polish

on:
  push:
    branches:
      - fix/tailadmin-professional-polish

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ !contains(github.event.head_commit.message, '[professional-polish-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/tailadmin-professional-polish
          fetch-depth: 0

      - name: Apply deterministic shell and page patches
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          shell_path = Path('tailadmin-shell.js')
          shell = shell_path.read_text()
          early = "  'use strict';\n"
          early_replacement = """  'use strict';

  // Mark the visual system immediately. Deferred feature scripts execute before
  // DOMContentLoaded and must never mistake a TailAdmin page for the legacy shell.
  document.documentElement.classList.add('medindex-tailadmin');
  document.documentElement.dataset.medindexShell = 'tailadmin';
"""
          if "dataset.medindexShell = 'tailadmin'" not in shell:
              if shell.count(early) != 1:
                  raise SystemExit('tailadmin-shell.js: use strict marker mismatch')
              shell = shell.replace(early, early_replacement, 1)

          old_order = """  function ensureStylesheetLast() {
    const link = document.querySelector('link[data-tailadmin-medindex-css]');
    if (link && document.head.lastElementChild !== link) document.head.appendChild(link);
  }
"""
          new_order = """  function ensureStylesheetLast() {
    const base = document.querySelector('link[data-tailadmin-medindex-css]');
    const professional = document.querySelector('link[data-tailadmin-professional-css]');
    if (base && professional) {
      if (base.nextElementSibling !== professional || document.head.lastElementChild !== professional) {
        document.head.append(base, professional);
      }
      return;
    }
    if (base && document.head.lastElementChild !== base) document.head.appendChild(base);
  }
"""
          if old_order not in shell and new_order not in shell:
              raise SystemExit('tailadmin-shell.js: stylesheet ordering block not found')
          shell = shell.replace(old_order, new_order, 1)
          shell_path.write_text(shell)

          enhancements_path = Path('ui-enhancements.js')
          enhancements = enhancements_path.read_text()
          theme_marker = "  const THEME_KEY = 'regjistriBarnave_theme_v1';\n"
          detector = """  const THEME_KEY = 'regjistriBarnave_theme_v1';

  function hasTailAdmin() {
    return Boolean(
      document.documentElement.classList.contains('medindex-tailadmin')
      || document.querySelector('link[data-tailadmin-medindex-css],script[src*="tailadmin-shell.js"]')
    );
  }
"""
          if 'function hasTailAdmin()' not in enhancements:
              if enhancements.count(theme_marker) != 1:
                  raise SystemExit('ui-enhancements.js: theme marker mismatch')
              enhancements = enhancements.replace(theme_marker, detector, 1)

          enhancements = enhancements.replace(
              "const legacyNavigationStyles = document.documentElement.classList.contains('medindex-tailadmin') ? '' : `",
              "const legacyNavigationStyles = hasTailAdmin() ? '' : `",
              1
          )
          if "const legacyNavigationStyles = hasTailAdmin() ? '' : `" not in enhancements:
              raise SystemExit('ui-enhancements.js: TailAdmin legacy-style guard missing')

          old_boot = """  const observer = new MutationObserver(schedule);
  observer.observe(document.documentElement, { childList: true, subtree: true });
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', decorate, { once: true });
  else decorate();
})();
"""
          new_boot = """  const observer = new MutationObserver(schedule);
  let enhancementsStarted = false;

  function startEnhancements() {
    if (enhancementsStarted) return;
    enhancementsStarted = true;
    observer.observe(document.documentElement, { childList: true, subtree: true });
    decorate();
  }

  if (hasTailAdmin()) {
    window.addEventListener('medindex:tailadmin-ready', startEnhancements, { once: true });
    if (document.body?.dataset.tailadminReady === '1') startEnhancements();
  } else if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startEnhancements, { once: true });
  } else {
    startEnhancements();
  }
})();
"""
          if old_boot not in enhancements and new_boot not in enhancements:
              raise SystemExit('ui-enhancements.js: bootstrap block not found')
          enhancements = enhancements.replace(old_boot, new_boot, 1)
          enhancements_path.write_text(enhancements)

          pages = [
              'index.html',
              'klasifikimi.html',
              'icd.html',
              'analizat.html',
              'dozologjia.html',
              'protokollet.html',
              'recetat.html',
          ]

          for page in pages:
              path = Path(page)
              html = path.read_text()

              html, css_count = re.subn(
                  r'<link rel="stylesheet" href="tailadmin-medindex\.css\?v=[^"]+" data-tailadmin-medindex-css>\s*',
                  '<link rel="stylesheet" href="tailadmin-medindex.css?v=20260724-3" data-tailadmin-medindex-css>\n'
                  '<link rel="stylesheet" href="tailadmin-professional.css?v=20260724-1" data-tailadmin-professional-css>\n',
                  html,
                  count=1,
              )
              if css_count != 1:
                  raise SystemExit(f'{page}: base TailAdmin CSS marker mismatch')

              html, js_count = re.subn(
                  r'<script src="tailadmin-shell\.js\?v=[^"]+" defer></script>\s*',
                  '<script src="tailadmin-shell.js?v=20260724-3" defer></script>\n'
                  '<script src="tailadmin-professional.js?v=20260724-1" defer></script>\n',
                  html,
                  count=1,
              )
              if js_count != 1:
                  raise SystemExit(f'{page}: TailAdmin shell script marker mismatch')
              path.write_text(html)

          package_path = Path('package.json')
          package = package_path.read_text()
          old_script = 'node tests/ui-navigation-audit-test.js'
          new_script = 'node tests/ui-navigation-audit-test.js && node tests/professional-ui-audit-test.js'
          if new_script not in package:
              if package.count(old_script) != 1:
                  raise SystemExit('package.json: UI test script marker mismatch')
              package = package.replace(old_script, new_script, 1)
          package_path.write_text(package)
          PY

      - name: Validate syntax and complete test suite
        shell: bash
        run: |
          set -euo pipefail
          node --check tailadmin-shell.js
          node --check tailadmin-professional.js
          node --check ui-enhancements.js
          npm install --ignore-scripts --no-audit --no-fund
          npm test

      - name: Commit validated professional UI
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-professional-polish.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Polish TailAdmin shell and every MedIndex section [professional-polish-applied]"
          git push origin HEAD:fix/tailadmin-professional-polish
