name: Export UI audit source

on:
  push:
    branches:
      - fix/tailadmin-deep-ui-audit
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: medindex-ui-audit-source
          path: |
            .
            !.git/**
            !node_modules/**
          include-hidden-files: true
          retention-days: 1
      # Temporary audit export; removed before pull request.
