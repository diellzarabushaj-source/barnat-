name: Apply TailAdmin deep UI audit

on:
  push:
    branches:
      - fix/tailadmin-deep-ui-audit

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify audit patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .ui-audit/tailadmin-nav-audit.patch.gz.b64 > /tmp/tailadmin-nav-audit.patch.gz
          echo '89cdf9dacfb66e1f607a456845a1a065720dcf0c051f7cc29b0b89134a3a53d1  /tmp/tailadmin-nav-audit.patch.gz' | sha256sum --check --strict
          gzip --decompress --stdout /tmp/tailadmin-nav-audit.patch.gz > /tmp/tailadmin-nav-audit.patch
          git apply --check /tmp/tailadmin-nav-audit.patch
          git apply /tmp/tailadmin-nav-audit.patch
          rm -rf .ui-audit
          rm -f .github/workflows/export-ui-audit-source.yml

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate JavaScript syntax
        run: |
          node --check tailadmin-shell.js
          node --check ui-enhancements.js

      - name: Run complete MedIndex suite
        run: npm test

      - name: Commit audited interface
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix TailAdmin navigation consistency and responsive shell'
          git push origin HEAD:fix/tailadmin-deep-ui-audit
